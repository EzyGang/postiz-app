---
name: Deployment

concurrency:
  group: deployment-${{ github.event_name == 'push' && 'main' || inputs.environment }}
  cancel-in-progress: true

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment"
        default: "main"
        type: environment

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    name: Build & Deploy
    if: github.event_name == 'push' || inputs.environment == 'main'
    environment:
      name: release
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver: docker-container

      - name: Build & Push Image
        env:
          DOCKER_REGISTRY: ${{ secrets.DOCKER_REGISTRY }}
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
          IMAGE_NAME: ${{ vars.IMAGE_NAME }}
          NEXT_PUBLIC_VERSION: ${{ github.sha }}
        run: |
          docker login -u $DOCKER_USERNAME -p $DOCKER_PASSWORD $DOCKER_REGISTRY

          docker buildx build --push --file Dockerfile.dev \
            --tag $DOCKER_REGISTRY/$IMAGE_NAME:latest \
            --build-arg NEXT_PUBLIC_VERSION=$NEXT_PUBLIC_VERSION \
            --cache-to "type=registry,ref=$DOCKER_REGISTRY/$IMAGE_NAME:deps,compression=zstd" \
            --cache-from "type=registry,ref=$DOCKER_REGISTRY/$IMAGE_NAME:deps" \
            .
